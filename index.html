<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1인기업 CEO 경영게임</title>
<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --card2:#273449;
    --accent:#38bdf8; --accent2:#818cf8;
    --good:#22c55e; --bad:#ef4444;
    --txt:#e2e8f0; --muted:#94a3b8; --line:#334155;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:"Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#1e3a5f 0%,var(--bg) 55%);
    color:var(--txt); min-height:100vh;
    display:flex; align-items:flex-start; justify-content:center;
    padding:24px 14px 60px;
  }
  .wrap{width:100%; max-width:680px;}
  .card{
    background:var(--card); border:1px solid var(--line);
    border-radius:18px; padding:28px 24px;
    box-shadow:0 18px 40px rgba(0,0,0,.35);
  }
  h1{font-size:26px; line-height:1.3; margin-bottom:6px;}
  .sub{color:var(--muted); font-size:14px; margin-bottom:22px;}
  .brand{color:var(--accent); font-weight:700;}
  .badge{
    display:inline-block; font-size:12px; color:var(--accent2);
    background:rgba(129,140,248,.12); border:1px solid rgba(129,140,248,.4);
    padding:4px 10px; border-radius:999px; margin-bottom:14px;
  }
  .defs{margin:18px 0 24px; display:grid; gap:10px;}
  .def{
    background:var(--card2); border-left:3px solid var(--accent);
    border-radius:8px; padding:11px 14px; font-size:14px; line-height:1.55;
  }
  .def b{color:var(--accent);}
  button{
    font-family:inherit; cursor:pointer; border:none; outline:none;
    transition:.15s; font-size:15px;
  }
  .btn-main{
    width:100%; background:linear-gradient(120deg,var(--accent),var(--accent2));
    color:#0b1220; font-weight:800; font-size:17px; padding:15px;
    border-radius:12px; margin-top:6px;
  }
  .btn-main:hover{filter:brightness(1.08); transform:translateY(-1px);}
  .btn-ghost{
    width:100%; background:transparent; color:var(--txt);
    border:1px solid var(--line); padding:13px; border-radius:12px; margin-top:10px;
  }
  .btn-ghost:hover{background:var(--card2);}

  /* progress */
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .qcount{font-size:13px; color:var(--muted);}
  .cat{font-size:12px; color:var(--accent2); background:rgba(129,140,248,.1);
       border:1px solid rgba(129,140,248,.35); padding:3px 9px; border-radius:999px;}
  .bar{height:7px; background:var(--card2); border-radius:99px; overflow:hidden; margin-bottom:22px;}
  .fill{height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .3s;}

  .qtype{font-size:12px; color:var(--muted); margin-bottom:8px; letter-spacing:.5px;}
  .qtext{font-size:19px; line-height:1.5; font-weight:700; margin-bottom:20px;}
  .opts{display:grid; gap:11px;}
  .opt{
    text-align:left; background:var(--card2); color:var(--txt);
    border:1.5px solid var(--line); border-radius:12px; padding:14px 16px;
    display:flex; gap:12px; align-items:center; line-height:1.4;
  }
  .opt:hover{border-color:var(--accent); background:#2c3a52;}
  .opt.sel{border-color:var(--accent); background:rgba(56,189,248,.14); box-shadow:0 0 0 1px var(--accent) inset;}
  .opt .mark{
    flex:0 0 26px; height:26px; border-radius:50%; background:var(--bg);
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; color:var(--muted);
  }
  .opt.sel .mark{background:var(--accent); color:#0b1220; border-color:var(--accent);}
  .ox{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .ox .opt{justify-content:center; font-size:30px; font-weight:800; padding:26px 0;}

  .nav{margin-top:24px;}

  /* result */
  .score-big{font-size:54px; font-weight:900; text-align:center; margin:6px 0 2px;
    background:linear-gradient(120deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  .score-sub{text-align:center; color:var(--muted); margin-bottom:6px;}
  .grade{text-align:center; font-size:18px; font-weight:700; margin-bottom:22px;}
  .review h3{font-size:15px; color:var(--muted); margin:18px 0 12px; border-top:1px solid var(--line); padding-top:18px;}
  .ritem{background:var(--card2); border-radius:12px; padding:14px 16px; margin-bottom:12px; border-left:3px solid var(--line);}
  .ritem.ok{border-left-color:var(--good);}
  .ritem.no{border-left-color:var(--bad);}
  .rq{font-weight:700; font-size:15px; line-height:1.5; margin-bottom:9px;}
  .rline{font-size:14px; line-height:1.5; margin:3px 0;}
  .tag{font-weight:700;}
  .tag.ok{color:var(--good);} .tag.no{color:var(--bad);}
  .yours.no{color:var(--bad);}
  .exp{font-size:13px; color:var(--muted); margin-top:8px; line-height:1.6;
       background:var(--bg); border-radius:8px; padding:10px 12px;}
  .exp b{color:var(--accent2);}
  .foot{text-align:center; color:#5b6b82; font-size:12px; margin-top:26px;}
  @media(max-width:480px){ h1{font-size:22px;} .qtext{font-size:17px;} .score-big{font-size:46px;} }
</style>
</head>
<body>
<div class="wrap">
  <!-- 시작 화면 -->
  <div id="start" class="card">
    <span class="badge">김형환 교수님 · 1인기업 CEO 경영스쿨</span>
    <h1>🎯 경영게임</h1>
    <p class="sub">강의 1~4회의 핵심을 <span class="brand">100문제</span> 중 <span class="brand">랜덤 10문제</span>로!<br>매 게임마다 아래 4대 정의는 반드시 출제됩니다.</p>
    <div class="defs">
      <div class="def"><b>비전</b>이란 나를 움직이는 가시화된 미래동력이다.</div>
      <div class="def"><b>경영</b>이란 바람직한 희망이 아니라 구체적인 업무로 성과를 만드는 것이다.</div>
      <div class="def"><b>전략</b>이란 기업의 목표 달성을 위한 선택적 행동계획이다.</div>
      <div class="def"><b>실행</b>이란 단순한 결정으로 단계별 경험을 통해 이루는 단기적 성과를 만드는 행동이다.</div>
    </div>
    <button class="btn-main" onclick="startGame()">게임 시작 ▶</button>
  </div>

  <!-- 퀴즈 화면 -->
  <div id="quiz" class="card" style="display:none;">
    <div class="topbar">
      <span class="qcount" id="qcount"></span>
      <span class="cat" id="cat"></span>
    </div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="qtype" id="qtype"></div>
    <div class="qtext" id="qtext"></div>
    <div id="answers"></div>
    <div class="nav">
      <button class="btn-main" id="nextBtn" onclick="next()" disabled>다음 →</button>
    </div>
  </div>

  <!-- 결과 화면 -->
  <div id="result" class="card" style="display:none;">
    <span class="badge">결과</span>
    <div class="score-big" id="scoreBig"></div>
    <div class="score-sub" id="scoreSub"></div>
    <div class="grade" id="grade"></div>
    <button class="btn-main" onclick="startGame()">🔄 다시 도전</button>
    <button class="btn-ghost" onclick="goHome()">처음으로</button>
    <div class="review" id="review">
      <h3>📒 오답노트 & 해설</h3>
      <div id="reviewList"></div>
    </div>
    <div class="foot">1인기업 CEO 경영스쿨 · 김형환</div>
  </div>
</div>

<script>
/* ======================= 문제 은행 (약 100문제) =======================
   type:"mc" → opts 배열, a = 정답 인덱스(0부터)
   type:"ox" → a = true(O가 정답) / false(X가 정답)
   concept   → vision/management/strategy/execution 은 매 게임 필수 출제
======================================================================= */
const BANK = [
/* ---------- 핵심정의: 비전 (필수) ---------- */
{c:"핵심정의",concept:"vision",type:"mc",q:"김형환 교수님이 정의한 '비전'은?",opts:["나를 움직이는 가시화된 미래동력","바람직한 희망을 품는 것","목표 달성을 위한 선택적 행동계획","단계별 경험을 통한 단기적 성과 행동"],a:0,exp:"비전이란 <b>나를 움직이는 가시화된 (감성적) 미래동력</b>이다. 아침에 비전을 보고 일어나라고 강조한다."},
{c:"핵심정의",concept:"vision",type:"ox",q:"비전이란 '나를 움직이는 가시화된 미래동력'이다.",a:true,exp:"맞다. 비전은 나를 움직이게 만드는 가시화된 미래동력으로, 연애에 비유된다."},
{c:"핵심정의",concept:"vision",type:"mc",q:"강의에서 '올바른 비전'의 예로 맞는 것은?",opts:["5년 뒤 숫자로 된 결과","행복하게 살기","열정적으로 살기","열심히 살기"],a:0,exp:"비전은 <b>5년 뒤 내가 이루는 숫자로 된 결과</b>여야 한다. '행복하게/열정적으로/열심히 살기'는 비전이 될 수 없다."},

/* ---------- 핵심정의: 경영 (필수) ---------- */
{c:"핵심정의",concept:"management",type:"mc",q:"'경영'의 정의로 올바른 것은?",opts:["바람직한 희망이 아니라 구체적인 업무로 성과를 만드는 것","나를 움직이는 가시화된 미래동력","목표 달성을 위한 선택적 행동계획","즐기면서 천천히 성장하는 것"],a:0,exp:"경영이란 <b>바람직한 희망이 아니라 구체적인 업무로 성과를 만드는 것</b>이다."},
{c:"핵심정의",concept:"management",type:"ox",q:"경영이란 '바람직한 희망'을 품는 것이다.",a:false,exp:"아니다. 경영은 바람직한 '희망'이 아니라 <b>구체적인 업무로 성과를 만드는 것</b>이다."},
{c:"핵심정의",concept:"management",type:"mc",q:"경영에서 '구체적인 업무'에 해당하는 핵심 도구는?",opts:["체크리스트","SWOT 분석","멘토 인터뷰","비전보드"],a:0,exp:"구체적인 업무 = <b>체크리스트</b>. 외과수술 안전관리에서 비롯됐으며 성공 확률을 높인다."},

/* ---------- 핵심정의: 전략 (필수) ---------- */
{c:"핵심정의",concept:"strategy",type:"mc",q:"'전략'의 정의로 올바른 것은?",opts:["기업의 목표 달성을 위한 선택적 행동계획","구체적 업무로 성과를 만드는 것","나를 움직이는 미래동력","단계별 경험으로 만든 단기 성과"],a:0,exp:"전략이란 <b>기업의 목표 달성을 위한 선택적 행동계획</b>이다."},
{c:"핵심정의",concept:"strategy",type:"ox",q:"전략은 반드시 해야만 하는 필수 행동계획이다.",a:false,exp:"아니다. 전략은 '<b>선택적</b>' 행동계획이다. 할 수도, 안 할 수도 있으며 '안 하는 것'도 하나의 방법이다."},
{c:"핵심정의",concept:"strategy",type:"mc",q:"전략에서 가장 강조한 키워드는?",opts:["차별화","모방","다수 추종","안정성"],a:0,exp:"전략의 핵심은 <b>차별화</b>. 남 따라가지 말고 내 강점·고객·비전을 조합해 내 길을 가라."},

/* ---------- 핵심정의: 실행 (필수) ---------- */
{c:"핵심정의",concept:"execution",type:"mc",q:"'실행'의 정의로 올바른 것은?",opts:["단순한 결정으로 단계별 경험을 통해 이루는 단기적 성과를 만드는 행동","복잡한 분석으로 장기 성과를 만드는 행동","희망을 구체화하는 것","외부 환경을 통제하는 것"],a:0,exp:"실행이란 <b>단순한 결정으로 단계별 경험을 통해 이루는 단기적 성과를 만드는 행동</b>이다. (단순·단계·단기)"},
{c:"핵심정의",concept:"execution",type:"ox",q:"실행이란 복잡한 분석을 통해 장기적 성과를 만드는 행동이다.",a:false,exp:"아니다. 실행은 <b>단순한 결정, 단계별 경험, 단기적 성과</b>가 핵심이다."},
{c:"핵심정의",concept:"execution",type:"mc",q:"실행력이 낮은 사람들의 공통점으로 언급된 것은?",opts:["생각이 많고 복잡하다","결정을 빨리 한다","단순하게 행동한다","단계별로 차근차근 한다"],a:0,exp:"실행력이 낮은 사람은 <b>생각이 많고 복잡</b>하다. 실행은 일단 단순하게 하는 것이다."},

/* ---------- 사명·비전 ---------- */
{c:"사명·비전",type:"mc",q:"사명문에서 가장 중요한 요소는?",opts:["고객","매출","경쟁사","트렌드"],a:0,exp:"사명문에서 가장 중요한 것은 <b>고객</b>이다. 핵심가치는 고객에게 내가 누구인지 알려주는 가치다."},
{c:"사명·비전",type:"mc",q:"사명(Mission)을 구성하는 3요소가 아닌 것은?",opts:["매출 목표","존재 목적","존재 가치","행동 규범(핵심가치)"],a:0,exp:"사명은 <b>존재 목적·존재 가치·행동 규범(핵심가치)</b>로 구성된다."},
{c:"사명·비전",type:"ox",q:"비전의 특징은 '플러스 5년'이다.",a:true,exp:"맞다. 비전은 +5년. 5년 뒤 내가 원하는 숫자로 된 결과를 그린다."},
{c:"사명·비전",type:"mc",q:"비전(5년 뒤 결과)은 궁극적으로 누구에게 이익이 되어야 하나?",opts:["나의 고객","나 자신","가족","경쟁자"],a:0,exp:"비전의 결과는 <b>고객에게 이익</b>이 되어야 한다. 그것이 가치를 높인다."},
{c:"사명·비전",type:"ox",q:"사명·비전문은 출력해서 책상·냉장고 등에 붙이라고 했다.",a:true,exp:"맞다. 출력해 벽·냉장고·매장·명함에 붙이고 인증샷을 찍으라 했다."},
{c:"사명·비전",type:"mc",q:"비전을 무엇에 비유했나?",opts:["연애","마라톤","등산","계약"],a:0,exp:"비전은 <b>연애</b>와 비슷하다. 나를 움직이게 만들고 엉뚱한 짓도 하게 만든다."},
{c:"사명·비전",type:"mc",q:"핵심가치(행동규범)를 볼펜의 어느 부위에 비유했나?",opts:["촉(펜촉)","뚜껑","몸통","클립"],a:0,exp:"핵심가치 = 볼펜의 <b>촉</b>. 촉이 빠지면 아무리 비싼 볼펜도 볼펜이 아니다."},
{c:"사명·비전",type:"mc",q:"비전을 잘게 쪼개는 순서로 옳은 것은?",opts:["5년 → 1년 → 3개월 → 매일(체크리스트)","매일 → 3개월 → 1년 → 5년","1년 → 5년 → 매일","3개월 → 1년 → 5년"],a:0,exp:"5년 비전을 <b>1년·3개월·매일(체크리스트)</b>로 쪼개어 관리한다."},
{c:"사명·비전",type:"ox",q:"행동규범(핵심가치)이 없으면 '그때그때 달라요'가 된다.",a:true,exp:"맞다. 핵심가치가 없으면 일관성이 사라져 그때그때 달라지고 신뢰를 잃는다."},
{c:"사명·비전",type:"mc",q:"위대한(그레이트) 사업이 되려면 '좋은 일'을 넘어 무엇을 해야 하나?",opts:["옳은 일","쉬운 일","돈 되는 일","유행하는 일"],a:0,exp:"'좋은 일'의 반대는 '<b>옳은 일</b>'. 좋고 좋아서는 위대해질 수 없고 옳은 사업을 해야 한다."},

/* ---------- 경영·마인드 ---------- */
{c:"경영·마인드",type:"mc",q:"경영자의 기본 마인드 3가지는?",opts:["결정 · 피드백 · 자신감","열정 · 성실 · 인내","돈 · 인맥 · 운","속도 · 규모 · 효율"],a:0,exp:"경영자 마인드 3가지 = <b>결정, 피드백, 자신감</b>."},
{c:"경영·마인드",type:"ox",q:"내가 결정하지 않으면 외부 환경이 나를 결정한다.",a:true,exp:"맞다. 스스로 결정하지 않으면 원치 않는 결과가 나를 결정한다."},
{c:"경영·마인드",type:"mc",q:"계란 비유: '외부 충격'으로 깨진 계란은?",opts:["계란후라이(요리감)","병아리(생명)","상한 계란","그대로 보존"],a:0,exp:"외부 충격으로 깨지면 <b>후라이</b>, 스스로 깨면 <b>생명(병아리)</b>. 스스로 결정하라는 비유."},

/* ======================= 게임 로직 ======================= */
const CORE = ["vision","management","strategy","execution"];
let quiz = [], idx = 0, answers = [];

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function pickOne(pool){ return pool[Math.floor(Math.random()*pool.length)]; }

function buildQuiz(){
  const chosen = [];
  // 1) 핵심정의 4개념 각 1문제 보장
  CORE.forEach(con=>{
    const pool = BANK.filter(q=>q.concept===con);
    chosen.push(pickOne(pool));
  });
  // 2) 나머지 6문제 랜덤 (중복·핵심정의 제외)
  const rest = shuffle(BANK.filter(q=>!chosen.includes(q) && !q.concept));
  chosen.push(...rest.slice(0,6));
  // 3) 전체 셔플 + 객관식 보기 셔플
  shuffle(chosen);
  return chosen.map(q=>{
    if(q.type==="mc"){
      const order = shuffle(q.opts.map((t,i)=>({t,correct:i===q.a})));
      return {...q, _opts:order};
    }
    return {...q};
  });
}

function startGame(){
  quiz = buildQuiz(); idx = 0; answers = new Array(quiz.length).fill(null);
  show("quiz"); render();
}
function show(id){
  ["start","quiz","result"].forEach(s=>document.getElementById(s).style.display = s===id?"block":"none");
  window.scrollTo(0,0);
}
function goHome(){ show("start"); }

function render(){
  const q = quiz[idx];
  document.getElementById("qcount").textContent = `문제 ${idx+1} / ${quiz.length}`;
  document.getElementById("cat").textContent = q.c;
  document.getElementById("fill").style.width = `${(idx)/quiz.length*100}%`;
  document.getElementById("qtype").textContent = q.type==="ox" ? "◯ / ✕ 문제" : "객관식";
  document.getElementById("qtext").textContent = q.q;

  const box = document.getElementById("answers");
  box.innerHTML = "";
  if(q.type==="ox"){
    box.className = "ox";
    [["O",true],["X",false]].forEach(([label,val])=>{
      const b = document.createElement("button");
      b.className = "opt" + (answers[idx]===val?" sel":"");
      b.textContent = label==="O" ? "◯" : "✕";
      b.onclick = ()=>{ answers[idx]=val; render(); };
      box.appendChild(b);
    });
  } else {
    box.className = "opts";
    const letters = ["①","②","③","④"];
    q._opts.forEach((o,i)=>{
      const b = document.createElement("button");
      b.className = "opt" + (answers[idx]===i?" sel":"");
      b.innerHTML = `<span class="mark">${letters[i]}</span><span>${o.t}</span>`;
      b.onclick = ()=>{ answers[idx]=i; render(); };
      box.appendChild(b);
    });
  }
  const btn = document.getElementById("nextBtn");
  btn.disabled = answers[idx]===null;
  btn.textContent = idx===quiz.length-1 ? "결과 보기 🏁" : "다음 →";
}

function next(){
  if(answers[idx]===null) return;
  if(idx < quiz.length-1){ idx++; render(); }
  else finish();
}

function isCorrect(q,ans){
  if(q.type==="ox") return ans===q.a;
  return q._opts[ans] && q._opts[ans].correct;
}

function finish(){
  let score = 0;
  quiz.forEach((q,i)=>{ if(isCorrect(q,answers[i])) score++; });
  show("result");
  document.getElementById("scoreBig").textContent = `${score} / ${quiz.length}`;
  document.getElementById("scoreSub").textContent = `100점 만점 환산 ${score*10}점`;
  const grades = [
    [10,"🏆 완벽한 1인 CEO! 즐기는 자를 이길 수 없죠."],
    [8,"🔥 훌륭합니다! 전략이 몸에 뱄네요."],
    [6,"👍 좋아요. 한 단계만 더 축적!"],
    [4,"📈 시작이 반! 복습하면 쑥쑥 오릅니다."],
    [0,"🌱 냥뛰! 강의 다시 보고 재도전해요."]
  ];
  document.getElementById("grade").textContent = grades.find(g=>score>=g[0])[1];

  const list = document.getElementById("reviewList");
  list.innerHTML = "";
  quiz.forEach((q,i)=>{
    const ok = isCorrect(q,answers[i]);
    let yours, correct;
    if(q.type==="ox"){
      yours = answers[i]===true?"◯":"✕";
      correct = q.a?"◯":"✕";
    } else {
      yours = q._opts[answers[i]].t;
      correct = q._opts.find(o=>o.correct).t;
    }
    const el = document.createElement("div");
    el.className = "ritem " + (ok?"ok":"no");
    el.innerHTML = `
      <div class="rq">${i+1}. ${q.q}</div>
      <div class="rline"><span class="tag ${ok?"ok":"no"}">${ok?"✓ 정답":"✗ 오답"}</span></div>
      <div class="rline yours ${ok?"":"no"}">내 선택: ${yours}</div>
      ${ok?"":`<div class="rline">정답: <b>${correct}</b></div>`}
      <div class="exp">💡 ${q.exp}</div>`;
    list.appendChild(el);
  });
}
