<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>경영게임</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --surface: #f9fafb;
  --border: #e5e7eb;
  --text: #111827;
  --muted: #6b7280;
  --accent: #6366f1;
  --accent-dark: #4338ca;
  --accent-bg: #eef2ff;
  --correct: #10b981;
  --correct-bg: #ecfdf5;
  --wrong: #ef4444;
  --wrong-bg: #fef2f2;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
  color: var(--text);
  display: flex;
  justify-content: center;
  background: #111;
}

.app {
  width: 100%;
  max-width: 480px;
  height: 100dvh;
  position: relative;
  overflow: hidden;
}

/* ── SCREEN SYSTEM ── */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}
.screen.exit-up {
  opacity: 0;
  pointer-events: none;
}

/* ════════════════════════════════
   HOME
════════════════════════════════ */
#home {
  background: #f0ecf8;
  overflow: hidden;
  align-items: center;
}

/* Gradient background */
.h-bg {
  position: absolute;
  inset: -10%;
  background:
    radial-gradient(ellipse 85% 60% at 50% 52%,
      #3730a3 0%,
      #4f46e5 18%,
      #818cf8 38%,
      rgba(129,140,248,0.18) 58%,
      transparent 72%
    );
  animation: bg-breathe 7s ease-in-out infinite;
  will-change: transform;
}

@keyframes bg-breathe {
  0%, 100% { transform: scale(1) translate(0, 0); }
  33%       { transform: scale(1.06) translate(-1%, 1%); }
  66%       { transform: scale(1.04) translate(1%, -1%); }
}

/* 상단 타이틀 */
.h-top {
  position: relative;
  z-index: 3;
  padding-top: 110px;
  text-align: center;
  width: 100%;
}

.h-center {
  flex: 1;
}

/* 하단 버튼 영역 */
.h-bottom {
  position: relative;
  z-index: 3;
  padding-bottom: 68px;
}

.h-info-top {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: #111;
  margin-bottom: 12px;
}
.h-info-name {
  font-size: 28px;
  font-weight: 800;
  color: #111;
  letter-spacing: -0.02em;
  line-height: 1.3;
}

.btn-pill {
  background: rgba(255,255,255,0.94);
  color: var(--accent-dark);
  border: none;
  border-radius: 100px;
  padding: 15px 26px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 10px 40px rgba(67,56,202,0.28);
  animation: pill-float 3.6s ease-in-out infinite;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.12s, box-shadow 0.12s;
}
.btn-pill .arr {
  font-size: 20px;
  line-height: 1;
  transform: translateX(0);
  transition: transform 0.2s;
}
.btn-pill:hover .arr { transform: translateX(3px); }
.btn-pill:active {
  transform: scale(0.93) translateY(3px) !important;
  box-shadow: 0 3px 12px rgba(67,56,202,0.18) !important;
  animation: none;
}
@keyframes pill-float {
  0%, 100% { transform: translateY(0);    box-shadow: 0 10px 40px rgba(67,56,202,0.28); }
  50%       { transform: translateY(-6px); box-shadow: 0 18px 48px rgba(67,56,202,0.38); }
}

/* ════════════════════════════════
   QUIZ
════════════════════════════════ */
#quiz {
  background: var(--bg);
  overflow: hidden;
}

.quiz-nav {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 56px 24px 0;
  flex-shrink: 0;
}

.btn-back {
  background: none;
  border: none;
  font-size: 24px;
  color: var(--muted);
  cursor: pointer;
  padding: 4px 8px 4px 0;
  line-height: 1;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s, transform 0.15s;
}
.btn-back:active { color: var(--text); transform: translateX(-3px); }

.progress-track {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}

.q-count {
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
  min-width: 36px;
  text-align: right;
}

.quiz-body {
  flex: 1;
  padding: 28px 24px 16px;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.q-tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
  opacity: 0;
  animation: fade-up 0.3s 0.05s ease forwards;
}
.q-text {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.55;
  color: var(--text);
  margin-bottom: 28px;
  opacity: 0;
  animation: fade-up 0.3s 0.1s ease forwards;
}
@keyframes fade-up {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* MC options */
.options-mc { display: flex; flex-direction: column; gap: 10px; }

.opt {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 15px 18px;
  text-align: left;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 12px;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.18s, background 0.18s, transform 0.12s;
  opacity: 0;
  animation: fade-up 0.3s ease forwards;
}
.opt:nth-child(1) { animation-delay: 0.15s; }
.opt:nth-child(2) { animation-delay: 0.21s; }
.opt:nth-child(3) { animation-delay: 0.27s; }
.opt:nth-child(4) { animation-delay: 0.33s; }

.opt:active { transform: scale(0.975); }
.opt.selected {
  border-color: var(--accent);
  background: var(--accent-bg);
  color: var(--accent);
}

.opt-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--border);
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.18s, color 0.18s;
}
.opt.selected .opt-num { background: var(--accent); color: #fff; }

/* OX options */
.options-ox {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  flex: 1;
}
.ox {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 54px;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 120px;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.18s, background 0.18s, transform 0.12s;
  opacity: 0;
  animation: fade-up 0.3s ease forwards;
}
.ox:nth-child(1) { animation-delay: 0.15s; }
.ox:nth-child(2) { animation-delay: 0.22s; }
.ox:active { transform: scale(0.95); }
.ox.selected {
  border-color: var(--accent);
  background: var(--accent-bg);
}

.quiz-foot {
  padding: 12px 24px 40px;
  flex-shrink: 0;
}

/* ════════════════════════════════
   RESULT
════════════════════════════════ */
#result {
  background: var(--bg);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.result-top {
  padding: 56px 28px 28px;
  border-bottom: 1px solid var(--border);
}

.result-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  opacity: 0;
  animation: fade-up 0.4s 0.05s ease forwards;
}
.result-score {
  font-size: 76px;
  font-weight: 900;
  color: var(--text);
  line-height: 1;
  margin-bottom: 8px;
  letter-spacing: -0.03em;
  opacity: 0;
  animation: fade-up 0.4s 0.12s ease forwards;
}
.result-score .denom {
  font-size: 30px;
  font-weight: 400;
  color: var(--muted);
  letter-spacing: 0;
}
.result-grade {
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
  opacity: 0;
  animation: fade-up 0.4s 0.2s ease forwards;
}

.result-actions {
  display: flex;
  gap: 10px;
  padding: 20px 24px;
  flex-shrink: 0;
}

.review-wrap {
  padding: 0 24px 60px;
}
.review-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
}
.review-item {
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 10px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.review-item.visible { opacity: 1; transform: translateY(0); }
.review-item.c { background: var(--correct-bg); }
.review-item.w { background: var(--wrong-bg); }

.ri-status {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.review-item.c .ri-status { color: var(--correct); }
.review-item.w .ri-status { color: var(--wrong); }
.ri-q { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.45; margin-bottom: 6px; }
.ri-ans { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
.ri-exp { font-size: 13px; color: var(--text); line-height: 1.55; opacity: 0.72; }

/* ── SHARED BUTTONS ── */
.btn-primary {
  flex: 1;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 17px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s, transform 0.12s;
}
.btn-primary:disabled { opacity: 0.28; cursor: not-allowed; }
.btn-primary:active:not(:disabled) { transform: scale(0.97); opacity: 0.85; }

.btn-ghost {
  flex: 1;
  background: none;
  color: var(--text);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 17px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s, transform 0.12s;
}
.btn-ghost:active { background: var(--surface); transform: scale(0.97); }
</style>
</head>
<body>
<div class="app">

  <!-- ══ HOME ══ -->
  <div class="screen active" id="home">
    <div class="h-bg" id="hBg"></div>

    <div class="h-top">
      <p class="h-info-top">김형환 교수님</p>
      <p class="h-info-name">1인기업 CEO<br>경영스쿨 복습 게임</p>
    </div>

    <div class="h-center"></div>

    <div class="h-bottom">
      <button class="btn-pill" onclick="startGame()">
        시작하기 <span class="arr">›</span>
      </button>
    </div>
  </div>

  <!-- ══ QUIZ ══ -->
  <div class="screen" id="quiz">
    <div class="quiz-nav">
      <button class="btn-back" onclick="confirmBack()">←</button>
      <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
      <span class="q-count" id="qcount"></span>
    </div>
    <div class="quiz-body">
      <div class="q-tag" id="qcat"></div>
      <div class="q-text" id="qq"></div>
      <div id="options"></div>
    </div>
    <div class="quiz-foot">
      <button class="btn-primary" id="nextBtn" style="width:100%;" onclick="nextQuestion()" disabled>다음</button>
    </div>
  </div>

  <!-- ══ RESULT ══ -->
  <div class="screen" id="result">
    <div class="result-top">
      <p class="result-eyebrow">결과</p>
      <div class="result-score" id="score"></div>
      <div class="result-grade" id="grade"></div>
    </div>
    <div class="result-actions">
      <button class="btn-ghost" onclick="goHome()">홈으로</button>
      <button class="btn-primary" onclick="startGame()">다시 도전</button>
    </div>
    <div class="review-wrap">
      <p class="review-label">문제 리뷰</p>
      <div id="reviewList"></div>
    </div>
  </div>

</div>
<script>
/* ── HOME INIT ── */
function initHome() {
  const bg = document.getElementById("hBg");
  document.getElementById("home").addEventListener("mousemove", e => {
    const r = e.currentTarget.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width  - 0.5) * 18;
    const y = ((e.clientY - r.top)  / r.height - 0.5) * 14;
    bg.style.transform = `translate(${x}px, ${y}px)`;
  });
  document.getElementById("home").addEventListener("mouseleave", () => {
    bg.style.transform = "";
  });
}
initHome();

/* ── SCREEN TRANSITIONS ── */
function show(id) {
  const cur = document.querySelector(".screen.active");
  const next = document.getElementById(id);
  if (cur === next) return;
  if (cur) cur.classList.remove("active");
  next.classList.add("active");
  next.scrollTop = 0;
}

/* ── QUESTIONS ── */
const QUESTIONS = [
  // 핵심정의 — 12개 전부
  {c:"핵심정의",concept:"vision",type:"mc",q:"김형환 교수님이 정의한 '비전'은?",opts:["나를 움직이는 가시화된 미래동력","바람직한 희망을 품는 것","목표 달성을 위한 선택적 행동계획","단계별 경험을 통한 단기적 성과 행동"],a:0,exp:"비전이란 나를 움직이는 가시화된 (감성적) 미래동력이다. 아침에 비전을 보고 일어나라."},
  {c:"핵심정의",concept:"vision",type:"ox",q:"비전이란 '나를 움직이는 가시화된 미래동력'이다.",a:true,exp:"맞다. 비전은 나를 움직이게 만드는 가시화된 미래동력으로, 연애에 비유된다."},
  {c:"핵심정의",concept:"vision",type:"mc",q:"올바른 비전의 예로 가장 적절한 것은?",opts:["5년 뒤 숫자로 된 결과","행복하게 살기","열정적으로 살기","영향력 있는 사람 되기"],a:0,exp:"비전은 5년 뒤 내가 이루는 구체적이고 숫자로 된 결과여야 한다. 감각화된 미래여야 아침에 일어날 수 있다."},
  {c:"핵심정의",concept:"management",type:"mc",q:"'경영'의 가장 정확한 정의는?",opts:["바람직한 희망이 아니라 구체적인 업무로 성과를 만드는 것","나를 움직이는 가시화된 미래동력","목표 달성을 위한 선택적 행동계획","즐기면서 천천히 성장하는 것"],a:0,exp:"경영이란 바람직한 희망이 아니라 구체적인 업무로 성과를 만드는 것이다."},
  {c:"핵심정의",concept:"management",type:"ox",q:"경영이란 '바람직한 희망'을 품는 것이다.",a:false,exp:"아니다. 경영은 바람직한 희망이 아니라 구체적인 업무로 성과를 만드는 것이다. 희망은 비전이다."},
  {c:"핵심정의",concept:"management",type:"mc",q:"구체적인 업무를 가장 잘 관리하는 도구는?",opts:["체크리스트","마인드맵","멘토 인터뷰","SWOT 분석"],a:0,exp:"구체적인 업무 = 체크리스트. 외과수술 안전관리에서 비롯됐으며, 빠짐을 막고 성공 확률을 높인다."},
  {c:"핵심정의",concept:"strategy",type:"mc",q:"'전략'의 정의로 가장 정확한 것은?",opts:["기업의 목표 달성을 위한 선택적 행동계획","구체적 업무로 성과를 만드는 것","나를 움직이는 미래동력","단계별 경험으로 만든 단기 성과"],a:0,exp:"전략이란 기업의 목표 달성을 위한 선택적 행동계획이다. 핵심은 '선택적'이다."},
  {c:"핵심정의",concept:"strategy",type:"ox",q:"전략은 반드시 해야만 하는 필수 행동계획이다.",a:false,exp:"아니다. 전략은 '선택적' 행동계획이다. 할 수도, 안 할 수도 있으며 '안 하는 것'도 하나의 전략이다."},
  {c:"핵심정의",concept:"strategy",type:"mc",q:"전략을 세울 때 가장 강조된 핵심 키워드는?",opts:["차별화","속도","규모","가격 경쟁력"],a:0,exp:"전략의 핵심은 차별화. 남 따라가지 말고 내 강점·고객·비전을 조합해 내 길을 가라."},
  {c:"핵심정의",concept:"execution",type:"mc",q:"'실행'의 정의로 가장 정확한 것은?",opts:["단순한 결정으로 단계별 경험을 통해 이루는 단기적 성과를 만드는 행동","복잡한 분석으로 장기 성과를 만드는 행동","희망을 구체화하는 것","외부 환경을 통제하는 것"],a:0,exp:"실행이란 단순한 결정 + 단계별 경험 + 단기적 성과가 핵심이다. (단순·단계·단기)"},
  {c:"핵심정의",concept:"execution",type:"ox",q:"실행이란 완벽한 계획을 세운 후 신중하게 추진하는 행동이다.",a:false,exp:"아니다. 실행은 단순한 결정, 단계별 경험, 단기적 성과가 핵심이다. 완벽함을 기다리지 않는다."},
  {c:"핵심정의",concept:"execution",type:"mc",q:"실행력이 낮은 사람들의 공통 특징은?",opts:["생각이 많고 복잡하다","결정을 빨리 한다","단순하게 행동한다","단계별로 차근차근 한다"],a:0,exp:"실행력이 낮은 사람은 생각이 많고 복잡하다. 실행은 일단 단순하게 하는 것이다."},
  // 사명·비전 — 5개

  {c:"심화",type:"mc",q:"점과 선과 면의 관계에서, '점'은?",opts:["선택·결정","순간·기회","시작점","기준점"],a:0,exp:"점(선택·결정) → 선(실행) → 면(기회·성과)."},
  {c:"심화",type:"ox",q:"결정과 실행 없이는 기회가 찾아온다.",a:false,exp:"아니다. 결정·실행이 면(기회)을 만든다."},
  {c:"심화",type:"mc",q:"개구리 우물 비유의 교훈은?",opts:["조금씩 올라갈수록 하늘이 넓어진다","우물 안이 가장 안전하다","빨리 뛰쳐나가야 한다","남이 끌어줄 때를 기다려야 한다"],a:0,exp:"조금씩 올라갈수록 하늘이 넓어진다. 단계적으로 시야를 넓혀라."},
  {c:"심화",type:"mc",q:"장범준(버스커 버스커)의 슈퍼스타K에서 가장 빛난 특징은?",opts:["떨어져도 붙어도 늘 즐겼다","가장 좋은 노래 실력","뛰어난 외모","심사위원들과의 관계"],a:0,exp:"늘 즐겼다. 즐기는 사람을 이길 수 없다."},
  {c:"심화",type:"mc",q:"실행하려던 계획이 있는데 완벽하게 준비될 때까지 기다려야 할까?",opts:["계획했으면 그 시점에 그냥 뛴다","최소 6개월은 더 준비한다","완벽해질 때까지 기다린다","다른 사람의 조언을 먼저 구한다"],a:0,exp:"완벽한 때는 없다. 계획했으면 '냥뛰'."},
  {c:"심화",type:"mc",q:"비전·경영·전략·실행 시스템을 한 문장으로 표현하면?",opts:["5년 꿈을 매일의 실행으로 만드는 것","돈을 최대한 버는 것","큰 조직을 만드는 것","남과 다르게 행동하기"],a:0,exp:"비전(5년)을 경영·전략·실행(매일)으로 만드는 시스템."},
  {c:"심화",type:"mc",q:"내가 하는 일이 '상품'이 되려면?",opts:["내 가치를 담아 상대의 최고 이익을 만들기","가장 싼 가격에 팔기","가장 많은 사람에게 팔기","가장 빠르게 만들기"],a:0,exp:"상품 = 자신의 가치를 담은 도구. 상대의 이익이 클수록 상품의 가치가 높다."}
];

const CORE = ["vision","management","strategy","execution"];
let quiz=[], idx=0, answers=[];

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function buildQuiz(){
  const chosen=[];
  CORE.forEach(con=>{
    const pool=QUESTIONS.filter(q=>q.concept===con);
    chosen.push(pool[Math.floor(Math.random()*pool.length)]);
  });
  const rest=shuffle(QUESTIONS.filter(q=>!chosen.includes(q)&&!q.concept));
  chosen.push(...rest.slice(0,6));
  shuffle(chosen);
  return chosen.map(q=>{
    if(q.type==="mc"){
      const order=shuffle(q.opts.map((t,i)=>({t,correct:i===q.a})));
      return{...q,_opts:order};
    }
    return{...q};
  });
}

function startGame(){
  quiz=buildQuiz(); idx=0; answers=new Array(quiz.length).fill(null);
  show("quiz"); render();
}

function show(id){
  const cur=document.querySelector(".screen.active");
  const next=document.getElementById(id);
  if(cur===next)return;
  if(cur){
    cur.classList.add("exit-up");
    setTimeout(()=>cur.classList.remove("active","exit-up"),380);
  }
  setTimeout(()=>{
    next.classList.add("active");
    next.scrollTop=0;
  }, cur ? 160 : 0);
}

function render(){
  const q=quiz[idx];
  document.getElementById("qcount").textContent=`${idx+1} / ${quiz.length}`;
  document.getElementById("qcat").textContent=q.c;
  document.getElementById("progress").style.width=`${(idx/quiz.length)*100}%`;

  // Re-trigger animations
  const tag=document.getElementById("qcat");
  const qq=document.getElementById("qq");
  tag.style.animation="none"; qq.style.animation="none";
  tag.offsetHeight; qq.offsetHeight;
  tag.style.animation=""; qq.style.animation="";
  tag.textContent=q.c; qq.textContent=q.q;

  const opts=document.getElementById("options");
  opts.innerHTML="";

  if(q.type==="ox"){
    opts.className="options-ox";
    [["◯",true],["✕",false]].forEach(([label,val])=>{
      const b=document.createElement("button");
      b.className="ox"+(answers[idx]===val?" selected":"");
      b.textContent=label;
      b.onclick=()=>{
        answers[idx]=val;
        opts.querySelectorAll(".ox").forEach(el=>el.classList.remove("selected"));
        b.classList.add("selected");
        document.getElementById("nextBtn").disabled=false;
      };
      opts.appendChild(b);
    });
  } else {
    opts.className="options-mc";
    q._opts.forEach((o,i)=>{
      const b=document.createElement("button");
      b.className="opt"+(answers[idx]===i?" selected":"");
      b.innerHTML=`<span class="opt-num">${i+1}</span><span>${o.t}</span>`;
      b.onclick=()=>{
        answers[idx]=i;
        opts.querySelectorAll(".opt").forEach(el=>el.classList.remove("selected"));
        b.classList.add("selected");
        const num=b.querySelector(".opt-num");
        opts.querySelectorAll(".opt-num").forEach(el=>{el.style.background="";el.style.color="";});
        if(num){num.style.background="var(--accent)";num.style.color="#fff";}
        document.getElementById("nextBtn").disabled=false;
      };
      opts.appendChild(b);
    });
  }

  const nb=document.getElementById("nextBtn");
  nb.disabled=answers[idx]===null;
  nb.textContent=idx===quiz.length-1?"결과 보기":"다음";
}

function nextQuestion(){
  if(answers[idx]===null)return;
  if(idx<quiz.length-1){idx++;render();}
  else finish();
}

function isCorrect(q,ans){
  if(q.type==="ox")return ans===q.a;
  return q._opts[ans]&&q._opts[ans].correct;
}

function finish(){
  let score=0;
  quiz.forEach((q,i)=>{if(isCorrect(q,answers[i]))score++;});
  show("result");
  document.getElementById("progress").style.width="100%";
  document.getElementById("score").innerHTML=`${score}<span class="denom"> / ${quiz.length}</span>`;
  const grades=[[10,"완벽한 1인 CEO"],[8,"전략이 몸에 뱄네요"],[6,"한 단계만 더 축적"],[4,"복습하면 쑥쑥 오릅니다"],[0,"강의 다시 보고 재도전"]];
  document.getElementById("grade").textContent=grades.find(g=>score>=g[0])[1];

  const list=document.getElementById("reviewList");
  list.innerHTML="";
  quiz.forEach((q,i)=>{
    const ok=isCorrect(q,answers[i]);
    let yours, correct;
    if(q.type==="ox"){yours=answers[i]===true?"◯":"✕";correct=q.a?"◯":"✕";}
    else{yours=q._opts[answers[i]]?.t||"?";correct=q._opts.find(o=>o.correct).t;}
    const el=document.createElement("div");
    el.className="review-item "+(ok?"c":"w");
    el.innerHTML=`
      <div class="ri-status">${ok?"✓ 정답":"✗ 오답"}</div>
      <div class="ri-q">${i+1}. ${q.q}</div>
      ${!ok?`<div class="ri-ans">내 답: ${yours} &nbsp;·&nbsp; 정답: <strong>${correct}</strong></div>`:""}
      <div class="ri-exp">${q.exp}</div>`;
    list.appendChild(el);
    // Staggered entrance
    setTimeout(()=>el.classList.add("visible"), 80 + i*60);
  });
}

function goHome(){show("home");}

function confirmBack(){
  if(answers.some(a=>a!==null)){
    if(!confirm("게임을 중단하고 홈으로 돌아갈까요?"))return;
  }
  goHome();
}
</script>
